    <!-- This skip link is here for accessibility. If someone is using a keyboard, they can jump straight to the main content instead of tabbing through the whole nav every time. -->
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <!--  I kept both  logo and main navigation. inside a wrapper so they line up nicely and stay within the max width. -->
    <header class="site-header">
        <div class="wrapper header-flex">
            <a href="#" class="logo-link" aria-label="My Coffee Company homepage">
        <img src="images/my-coffee-shop-logo.svg" alt="My Coffee Company logo"></a>
        <!-- Main Navigation -->
            <nav aria-label="Primary navigation">
                <ul class="nav-list">

                </ul>

        </div>
    </header>

         <section class="hero">
            <div class="wrapper hero-content">
                <h1>Experience coffee like never before</h1>
                
                <p>We craft more than beverages; we curate memories, one flavorful moment at a time. Embrace the aroma and let every visit be a chapter in your coffee story.</p>

                <a href="#" class="btn btn-light"></a>
            </div>
         </section>
    </main>
